
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 500m;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # 全局 WebSocket 超时（24小时）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # MyPlatform：前端静态资源在 ./html（由 frontend 执行 npm run build 生成），与后端 CORS 允许的 http://localhost:8081 一致。
    server {
        listen       8081;
        server_name  localhost;

        #access_log  logs/host.access.log  main;

        # 前端 SPA（React Router）：无物理文件时回退 index.html
        location / {
            root   html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # 反向代理 Spring Boot（默认 8080）
        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 必须显式转发，否则浏览器带的 Authorization 可能到不了 Spring，拦截器会报「未携带 token」
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://127.0.0.1:8080;
        }

        # WebSocket 反向代理
        location /ws/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            # WebSocket 超时比普通 HTTP 长
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_pass http://127.0.0.1:8080;
        }

        # 头像文件反向代理
        location /avatars/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_pass http://127.0.0.1:8080/;
        }

        # 聊天文件直接从本地存储（磁盘中的 uploads/files 目录中读取）
        location /uploads/files/ {
            alias C:/Users/Elaina/program/Java/MyPlatform/uploads/files/;
            expires 30d;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }


